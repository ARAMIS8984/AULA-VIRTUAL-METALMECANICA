<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes - AulaSENA</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  .barra-porcentaje {
    background: var(--gris-borde);
    border-radius: 6px;
    height: 8px;
    width: 100px;
    overflow: hidden;
  }
  .barra-porcentaje-interna { height: 100%; border-radius: 6px; }
  .fila-porcentaje { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="marca">Aula<span>SENA</span></div>
  <nav>
    <a href="dashboard.html">Fichas</a>
    <a href="asistencia.html">Asistencia</a>
    <a href="material.html">Material</a>
    <a href="examenes.html">Exámenes</a>
    <a href="foro.html">Foro</a>
    <a href="reportes.html" class="activo">Reportes</a>
  </nav>
  <button class="btn-salir" onclick="cerrarSesionInstructor()">Salir</button>
</div>

<div class="contenedor" style="padding-top:32px; padding-bottom:48px;">
  <h2 style="margin-bottom:20px;">Reportes de asistencia</h2>

  <div class="tarjeta" style="margin-bottom:20px;">
    <div class="grid-2">
      <div class="campo" style="margin-bottom:0;">
        <label for="select-ficha">Ficha</label>
        <select id="select-ficha" onchange="cargarReporte()"></select>
      </div>
      <div class="campo" style="margin-bottom:0;">
        <label for="filtro-rango">Rango de fechas</label>
        <div style="display:flex; gap:8px;">
          <input type="date" id="fecha-desde" onchange="cargarReporte()">
          <input type="date" id="fecha-hasta" onchange="cargarReporte()">
        </div>
      </div>
    </div>
  </div>

  <div id="resumen-general" class="grid-2" style="margin-bottom:20px;"></div>

  <div class="tarjeta" id="gestion-dias" style="margin-bottom:20px;"></div>

  <div class="tarjeta" style="padding:0;">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px;">
      <h3 style="margin:0;">Asistencia por aprendiz</h3>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secundario" onclick="exportarExcel()">⬇ Exportar a Excel</button>
        <button class="btn btn-peligro" onclick="eliminarTodoElHistorial()">🗑 Eliminar todo</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Aprendiz</th>
            <th>Documento</th>
            <th>Días registrados</th>
            <th>Presente</th>
            <th>Ausente</th>
            <th>Excusa</th>
            <th>Tarde</th>
            <th>% Asistencia</th>
          </tr>
        </thead>
        <tbody id="tabla-reporte">
          <tr><td colspan="9" style="color:var(--gris-texto); text-align:center; padding:24px;">Selecciona una ficha.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
requerirSesionInstructor();

let datosReporteActual = [];
let fichaSeleccionadaInfo = null;

async function cargarFichas() {
  const { data: fichas, error } = await supabaseClient
    .from('fichas')
    .select('id, numero_ficha, programa, nombre_grupo')
    .order('created_at', { ascending: false });

  const select = document.getElementById('select-ficha');
  if (error || !fichas || fichas.length === 0) {
    select.innerHTML = '<option value="">No hay fichas creadas</option>';
    return;
  }
  select.innerHTML = fichas.map(f => `<option value="${f.id}">${f.nombre_grupo ? f.nombre_grupo + ' — ' : ''}Ficha ${f.numero_ficha} · ${f.programa}</option>`).join('');
  cargarReporte();
}

async function cargarReporte() {
  const fichaId = document.getElementById('select-ficha').value;
  const tbody = document.getElementById('tabla-reporte');
  const resumen = document.getElementById('resumen-general');

  if (!fichaId) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:var(--gris-texto); text-align:center; padding:24px;">Selecciona una ficha.</td></tr>';
    resumen.innerHTML = '';
    return;
  }

  fichaSeleccionadaInfo = document.getElementById('select-ficha').selectedOptions[0].textContent;

  const fechaDesde = document.getElementById('fecha-desde').value;
  const fechaHasta = document.getElementById('fecha-hasta').value;

  const { data: aprendices, error: errorAprendices } = await supabaseClient
    .from('aprendices')
    .select('id, nombre_completo, numero_documento')
    .eq('ficha_id', fichaId)
    .order('nombre_completo');

  if (errorAprendices || !aprendices) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--rojo-error); text-align:center; padding:24px;">Error: ${errorAprendices?.message}</td></tr>`;
    return;
  }

  let consulta = supabaseClient
    .from('asistencia')
    .select('aprendiz_id, estado, fecha, observacion, competencia_id, competencias(nombre)')
    .eq('ficha_id', fichaId);

  if (fechaDesde) consulta = consulta.gte('fecha', fechaDesde);
  if (fechaHasta) consulta = consulta.lte('fecha', fechaHasta);

  const { data: registros, error: errorAsistencia } = await consulta;

  if (errorAsistencia) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--rojo-error); text-align:center; padding:24px;">Error: ${errorAsistencia.message}</td></tr>`;
    return;
  }

  const totalDiasUnicos = new Set((registros || []).map(r => r.fecha)).size;

  datosReporteActual = aprendices.map(a => {
    const registrosAprendiz = (registros || []).filter(r => r.aprendiz_id === a.id);
    const dias = registrosAprendiz.length;
    const presente = registrosAprendiz.filter(r => r.estado === 'Presente').length;
    const ausente = registrosAprendiz.filter(r => r.estado === 'Ausente').length;
    const excusa = registrosAprendiz.filter(r => r.estado === 'Excusa').length;
    const tarde = registrosAprendiz.filter(r => r.estado === 'Tarde').length;
    // Cuentan como asistencia efectiva: Presente + Tarde
    const porcentaje = dias > 0 ? Math.round(((presente + tarde) / dias) * 100) : 0;
    return {
      id: a.id,
      nombre: a.nombre_completo,
      documento: a.numero_documento,
      dias, presente, ausente, excusa, tarde, porcentaje,
      detalle: registrosAprendiz
        .slice()
        .sort((x, y) => y.fecha.localeCompare(x.fecha)),
    };
  });

  renderizarTabla();
  renderizarResumen(totalDiasUnicos);
  renderizarGestionDias(registros || [], fichaId);
}

function colorBarra(porcentaje) {
  if (porcentaje >= 85) return 'var(--verde-sena)';
  if (porcentaje >= 70) return 'var(--amarillo-alerta)';
  return 'var(--rojo-error)';
}

function renderizarTabla() {
  const tbody = document.getElementById('tabla-reporte');
  if (datosReporteActual.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="color:var(--gris-texto); text-align:center; padding:24px;">Esta ficha no tiene aprendices.</td></tr>';
    return;
  }
  tbody.innerHTML = datosReporteActual.map((d, i) => `
    <tr>
      <td><button type="button" onclick="alternarDetalle(${i})" style="border:none; background:none; cursor:pointer; font-size:1rem;" id="btn-expandir-${i}">▸</button></td>
      <td>${d.nombre}</td>
      <td>${d.documento}</td>
      <td>${d.dias}</td>
      <td>${d.presente}</td>
      <td>${d.ausente}</td>
      <td>${d.excusa}</td>
      <td>${d.tarde}</td>
      <td>
        <div class="fila-porcentaje">
          <div class="barra-porcentaje"><div class="barra-porcentaje-interna" style="width:${d.porcentaje}%; background:${colorBarra(d.porcentaje)};"></div></div>
          <span style="font-weight:600; font-size:0.85rem;">${d.porcentaje}%</span>
        </div>
      </td>
    </tr>
    <tr id="fila-detalle-${i}" class="oculto">
      <td colspan="9" style="background:var(--gris-fondo); padding:14px 20px;">
        ${d.detalle.length === 0
          ? '<p class="texto-ayuda" style="margin:0;">Sin registros en el rango seleccionado.</p>'
          : `<table style="background:var(--blanco); border-radius:8px; overflow:hidden;">
              <thead><tr><th>Fecha</th><th>Estado</th><th>Competencia</th><th>Justificación</th></tr></thead>
              <tbody>
                ${d.detalle.map(r => `
                  <tr>
                    <td>${new Date(r.fecha + 'T00:00:00').toLocaleDateString('es-CO', { weekday: 'short', day: '2-digit', month: 'short' })}</td>
                    <td><span class="etiqueta ${r.estado === 'Presente' ? 'etiqueta-verde' : r.estado === 'Ausente' ? 'etiqueta-rojo' : 'etiqueta-gris'}">${r.estado}</span></td>
                    <td>${r.competencias?.nombre || '—'}</td>
                    <td>${r.observacion || '—'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>`
        }
      </td>
    </tr>
  `).join('');
}

function alternarDetalle(indice) {
  const fila = document.getElementById(`fila-detalle-${indice}`);
  const boton = document.getElementById(`btn-expandir-${indice}`);
  const abierto = !fila.classList.contains('oculto');
  fila.classList.toggle('oculto', abierto);
  boton.textContent = abierto ? '▸' : '▾';
}

function renderizarResumen(totalDias) {
  const resumen = document.getElementById('resumen-general');
  const promedioGeneral = datosReporteActual.length > 0
    ? Math.round(datosReporteActual.reduce((sum, d) => sum + d.porcentaje, 0) / datosReporteActual.length)
    : 0;
  const enRiesgo = datosReporteActual.filter(d => d.porcentaje < 70 && d.dias > 0).length;

  resumen.innerHTML = `
    <div class="tarjeta">
      <p class="texto-ayuda">Días de clase registrados</p>
      <p style="font-size:1.8rem; font-weight:700; color:var(--azul-sena);">${totalDias}</p>
    </div>
    <div class="tarjeta">
      <p class="texto-ayuda">Promedio de asistencia general</p>
      <p style="font-size:1.8rem; font-weight:700; color:${colorBarra(promedioGeneral)};">${promedioGeneral}%</p>
    </div>
    <div class="tarjeta" style="grid-column: span 2;">
      <p class="texto-ayuda">Aprendices con asistencia menor al 70% (en riesgo)</p>
      <p style="font-size:1.8rem; font-weight:700; color:var(--rojo-error);">${enRiesgo}</p>
    </div>
  `;
}

// Agrupa los registros por (fecha, competencia) y muestra un botón para eliminar
// esa sesión completa (todos los aprendices de ese día/competencia).
function renderizarGestionDias(registros, fichaId) {
  const cont = document.getElementById('gestion-dias');
  if (registros.length === 0) {
    cont.innerHTML = '<p class="texto-ayuda" style="margin:0;">No hay días de asistencia registrados en el rango seleccionado.</p>';
    return;
  }

  const sesiones = {};
  registros.forEach(r => {
    const clave = `${r.fecha}|${r.competencia_id || ''}`;
    if (!sesiones[clave]) {
      sesiones[clave] = { fecha: r.fecha, competenciaId: r.competencia_id, competenciaNombre: r.competencias?.nombre || 'Sin especificar', cantidad: 0 };
    }
    sesiones[clave].cantidad++;
  });

  const listaOrdenada = Object.values(sesiones).sort((a, b) => b.fecha.localeCompare(a.fecha));

  cont.innerHTML = `
    <h3 style="margin-bottom:10px; font-size:0.95rem;">Gestionar días registrados</h3>
    <div style="display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto;">
      ${listaOrdenada.map(s => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border:1px solid var(--gris-borde); border-radius:8px;">
          <span style="font-size:0.85rem;">
            <strong>${new Date(s.fecha + 'T00:00:00').toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' })}</strong>
            · ${s.competenciaNombre} · ${s.cantidad} registro(s)
          </span>
          <button class="btn btn-peligro" style="font-size:0.75rem; padding:5px 10px; min-height:auto;"
            onclick="eliminarSesionDia('${fichaId}', '${s.fecha}', ${s.competenciaId ? `'${s.competenciaId}'` : 'null'})">Eliminar</button>
        </div>
      `).join('')}
    </div>
  `;
}

async function eliminarSesionDia(fichaId, fecha, competenciaId) {
  if (!confirm(`¿Eliminar toda la asistencia del ${fecha} para esta competencia? Esta acción no se puede deshacer.`)) return;

  let consulta = supabaseClient
    .from('asistencia')
    .delete()
    .eq('ficha_id', fichaId)
    .eq('fecha', fecha);

  consulta = competenciaId ? consulta.eq('competencia_id', competenciaId) : consulta.is('competencia_id', null);

  const { error } = await consulta;
  if (error) {
    alert('No se pudo eliminar: ' + error.message);
    return;
  }
  cargarReporte();
}

async function eliminarTodoElHistorial() {
  const fichaId = document.getElementById('select-ficha').value;
  if (!fichaId) return;
  if (!confirm('¿Eliminar TODO el historial de asistencia de esta ficha? Esta acción no se puede deshacer y borrará todos los días registrados.')) return;
  if (!confirm('Confirma una vez más: se borrará permanentemente toda la asistencia de esta ficha. ¿Continuar?')) return;

  const { error } = await supabaseClient.from('asistencia').delete().eq('ficha_id', fichaId);
  if (error) {
    alert('No se pudo eliminar: ' + error.message);
    return;
  }
  cargarReporte();
}

function exportarExcel() {
  if (datosReporteActual.length === 0) return;

  const filas = datosReporteActual.map(d => ({
    'Aprendiz': d.nombre,
    'Documento': d.documento,
    'Días registrados': d.dias,
    'Presente': d.presente,
    'Ausente': d.ausente,
    'Excusa': d.excusa,
    'Tarde': d.tarde,
    '% Asistencia': d.porcentaje,
  }));

  const hoja = XLSX.utils.json_to_sheet(filas);
  const libro = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro, hoja, 'Asistencia');

  const nombreArchivo = `Reporte_Asistencia_${(fichaSeleccionadaInfo || 'ficha').split(' - ')[0]}.xlsx`;
  XLSX.writeFile(libro, nombreArchivo);
}

cargarFichas();
</script>
</body>
</html>

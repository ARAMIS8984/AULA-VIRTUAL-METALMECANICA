<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material de formación - AulaSENA</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .tarjeta-material {
    display: flex;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    align-items: flex-start;
  }
  .tarjeta-material .icono-tipo { font-size: 1.5rem; }
  .tarjeta-material .contenido { flex: 1; min-width: 0; }
  .tarjeta-material .titulo { font-weight: 600; }
  .tarjeta-material .descripcion { font-size: 0.85rem; color: var(--gris-texto); margin-top: 2px; }
  .tarjeta-material .meta { font-size: 0.78rem; color: var(--gris-texto); margin-top: 6px; }
  .grupo-competencia { margin-bottom: 24px; }
  .grupo-competencia h4 { color: var(--azul-sena); margin-bottom: 10px; font-size: 0.95rem; }
  .lista-materiales { display: flex; flex-direction: column; gap: 10px; }

  .modal-visor { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-visor.visible { display: flex; }
  .modal-visor-contenido { background: var(--blanco); border-radius: 12px; width: 100%; max-width: 900px; height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-visor-cabecera { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--gris-borde); }
  .modal-visor-cabecera h4 { margin: 0; font-size: 0.95rem; }
  .modal-visor-cerrar { border: none; background: none; font-size: 1.4rem; cursor: pointer; color: var(--gris-texto); line-height: 1; }
  .modal-visor-cuerpo { flex: 1; overflow: auto; background: var(--gris-fondo); }
  .modal-visor-cuerpo iframe, .modal-visor-cuerpo img { width: 100%; height: 100%; border: none; object-fit: contain; display: block; }
</style>
</head>
<body>

<div class="modal-visor" id="modal-visor">
  <div class="modal-visor-contenido">
    <div class="modal-visor-cabecera">
      <h4 id="modal-visor-titulo"></h4>
      <button class="modal-visor-cerrar" onclick="cerrarVisor()">✕</button>
    </div>
    <div class="modal-visor-cuerpo" id="modal-visor-cuerpo"></div>
  </div>
</div>

<div class="topbar">
  <div class="marca">Aula<span>SENA</span></div>
  <nav>
    <a href="dashboard.html">Fichas</a>
    <a href="asistencia.html">Asistencia</a>
    <a href="material.html" class="activo">Material</a>
    <a href="examenes.html">Exámenes</a>
    <a href="foro.html">Foro</a>
    <a href="calificaciones.html">Calificaciones</a>
    <a href="solicitudes.html">Solicitudes</a>
    <a href="reportes.html">Reportes</a>
  </nav>
  <button class="btn-salir" onclick="cerrarSesionInstructor()">Salir</button>
</div>

<div class="contenedor" style="padding-top:32px; padding-bottom:48px; max-width:820px;">
  <h2 style="margin-bottom:20px;">Material de formación</h2>

  <div class="tarjeta espaciado-v" style="margin-bottom:20px;">
    <div class="campo" style="margin-bottom:0;">
      <label for="select-ficha">Ficha</label>
      <select id="select-ficha" onchange="alCambiarFicha()"></select>
    </div>
  </div>

  <!-- Formulario para agregar material -->
  <div class="tarjeta espaciado-v" style="margin-bottom:24px;">
    <h3 style="margin-bottom:4px;">Agregar material</h3>

    <div class="campo" style="margin-bottom:0;">
      <label for="titulo-material">Título</label>
      <input type="text" id="titulo-material" placeholder="Ej: Guía de mantenimiento preventivo">
    </div>

    <div class="grid-2">
      <div class="campo" style="margin-bottom:0;">
        <label for="tipo-material">Tipo</label>
        <select id="tipo-material" onchange="alCambiarTipo()">
          <option value="documento">📄 Documento descargable (subir archivo — el aprendiz lo ve y lo descarga)</option>
          <option value="enlace">🔗 Enlace externo (una URL a otra página)</option>
          <option value="video">🎬 Video</option>
        </select>
      </div>
      <div class="campo" style="margin-bottom:0;">
        <label for="select-semana">Semana</label>
        <select id="select-semana">
          <option value="">Sin asignar</option>
          <option value="1">Semana 1</option>
          <option value="2">Semana 2</option>
          <option value="3">Semana 3</option>
          <option value="4">Semana 4</option>
          <option value="5">Semana 5</option>
          <option value="6">Semana 6</option>
          <option value="7">Semana 7</option>
          <option value="8">Semana 8</option>
          <option value="9">Semana 9</option>
          <option value="10">Semana 10</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="campo" style="margin-bottom:0;">
        <label for="select-competencia-material">Competencia (opcional)</label>
        <select id="select-competencia-material" onchange="cargarResultadosMaterial()">
          <option value="">Sin especificar</option>
        </select>
      </div>
      <div></div>
    </div>

    <div id="bloque-archivo" class="campo" style="margin-bottom:0;">
      <label>Archivo</label>
      <div class="zona-carga" id="zona-carga" onclick="document.getElementById('input-archivo').click()">
        <div class="icono">📎</div>
        <p id="texto-zona-carga"><strong>Haz clic para subir</strong> o arrastra el archivo aquí</p>
      </div>
      <input type="file" id="input-archivo" class="oculto">
    </div>

    <div id="bloque-url" class="campo oculto" style="margin-bottom:0;">
      <label for="url-material">URL</label>
      <input type="text" id="url-material" placeholder="https://...">
    </div>

    <div class="campo" style="margin-bottom:0;">
      <label for="descripcion-material">Descripción (opcional)</label>
      <textarea id="descripcion-material" rows="2" placeholder="Breve descripción del material"></textarea>
    </div>

    <div class="campo" style="margin-bottom:0;">
      <label>Resultados de aprendizaje relacionados (opcional)</label>
      <div id="checks-resultados-material" style="border:1px solid var(--gris-borde); border-radius:8px; padding:10px 12px; max-height:120px; overflow-y:auto;">
        <p class="texto-ayuda" style="margin:0;">Elige una competencia primero.</p>
      </div>
    </div>

    <div class="mensaje-error" id="mensaje-error"></div>
    <div class="mensaje-error" id="mensaje-exito" style="background:rgba(57,169,0,0.1); color:var(--verde-oscuro);"></div>

    <button class="btn btn-primario" id="btn-guardar-material" onclick="guardarMaterial()">+ Agregar material</button>
  </div>

  <!-- Lista de material existente -->
  <div id="lista-material-completa">
    <p style="color:var(--gris-texto);">Selecciona una ficha para ver su material.</p>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/image-utils.js"></script>
<script>
requerirSesionInstructor();

const ICONOS_TIPO = { documento: '📄', enlace: '🔗', video: '🎬' };

async function cargarFichas() {
  const { data: fichas, error } = await supabaseClient
    .from('fichas')
    .select('id, numero_ficha, programa, nombre_grupo')
    .order('created_at', { ascending: false });

  const select = document.getElementById('select-ficha');
  if (error || !fichas || fichas.length === 0) {
    select.innerHTML = '<option value="">No hay fichas creadas</option>';
    return;
  }
  select.innerHTML = fichas.map(f => `<option value="${f.id}">${f.nombre_grupo ? f.nombre_grupo + ' — ' : ''}Ficha ${f.numero_ficha} · ${f.programa}</option>`).join('');

  const ultimaFichaUsada = localStorage.getItem('aulasena_ultima_ficha');
  if (ultimaFichaUsada && fichas.some(f => f.id === ultimaFichaUsada)) {
    select.value = ultimaFichaUsada;
  }
  alCambiarFicha();
}

async function alCambiarFicha() {
  const fichaId = document.getElementById('select-ficha').value;
  if (!fichaId) return;
  localStorage.setItem('aulasena_ultima_ficha', fichaId);
  await cargarCompetenciasMaterial(fichaId);
  await cargarListaMaterial(fichaId);
}

async function cargarCompetenciasMaterial(fichaId) {
  const { data: competencias, error } = await supabaseClient
    .from('competencias')
    .select('id, nombre')
    .eq('ficha_id', fichaId)
    .order('nombre');

  const select = document.getElementById('select-competencia-material');
  select.innerHTML = '<option value="">Sin especificar</option>' +
    (competencias || []).map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
  document.getElementById('checks-resultados-material').innerHTML = '<p class="texto-ayuda" style="margin:0;">Elige una competencia primero.</p>';
}

async function cargarResultadosMaterial() {
  const competenciaId = document.getElementById('select-competencia-material').value;
  const cont = document.getElementById('checks-resultados-material');
  if (!competenciaId) {
    cont.innerHTML = '<p class="texto-ayuda" style="margin:0;">Elige una competencia primero.</p>';
    return;
  }
  const { data: resultados, error } = await supabaseClient
    .from('resultados_aprendizaje')
    .select('id, nombre')
    .eq('competencia_id', competenciaId)
    .order('nombre');

  if (error || !resultados || resultados.length === 0) {
    cont.innerHTML = '<p class="texto-ayuda" style="margin:0;">Sin resultados registrados para esta competencia.</p>';
    return;
  }
  cont.innerHTML = resultados.map(r => `
    <label style="display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-weight:400; font-size:0.85rem; cursor:pointer;">
      <input type="checkbox" class="check-resultado-material" value="${r.id}" style="margin-top:3px;">
      <span>${r.nombre}</span>
    </label>
  `).join('');
}

function alCambiarTipo() {
  const tipo = document.getElementById('tipo-material').value;
  document.getElementById('bloque-archivo').classList.toggle('oculto', tipo !== 'documento');
  document.getElementById('bloque-url').classList.toggle('oculto', tipo === 'documento');
  document.getElementById('url-material').placeholder = tipo === 'video' ? 'https://youtube.com/... o https://vimeo.com/...' : 'https://...';
}

const inputArchivo = document.getElementById('input-archivo');
const zonaCarga = document.getElementById('zona-carga');
let archivoSeleccionado = null;

inputArchivo.addEventListener('change', (e) => {
  archivoSeleccionado = e.target.files[0] || null;
  document.getElementById('texto-zona-carga').innerHTML = archivoSeleccionado
    ? `<strong>${archivoSeleccionado.name}</strong>`
    : `<strong>Haz clic para subir</strong> o arrastra el archivo aquí`;
});
zonaCarga.addEventListener('dragover', (e) => { e.preventDefault(); zonaCarga.classList.add('arrastrando'); });
zonaCarga.addEventListener('dragleave', () => zonaCarga.classList.remove('arrastrando'));
zonaCarga.addEventListener('drop', (e) => {
  e.preventDefault();
  zonaCarga.classList.remove('arrastrando');
  archivoSeleccionado = e.dataTransfer.files[0] || null;
  document.getElementById('texto-zona-carga').innerHTML = archivoSeleccionado
    ? `<strong>${archivoSeleccionado.name}</strong>`
    : `<strong>Haz clic para subir</strong> o arrastra el archivo aquí`;
});

async function guardarMaterial() {
  ocultarMensajes();
  const fichaId = document.getElementById('select-ficha').value;
  const titulo = document.getElementById('titulo-material').value.trim();
  const tipo = document.getElementById('tipo-material').value;
  const semana = document.getElementById('select-semana').value || null;
  const competenciaId = document.getElementById('select-competencia-material').value || null;
  const descripcion = document.getElementById('descripcion-material').value.trim();
  const resultadosSeleccionados = Array.from(document.querySelectorAll('.check-resultado-material:checked')).map(el => el.value);

  if (!fichaId) { mostrarError('Selecciona una ficha.'); return; }
  if (!titulo) { mostrarError('El título es obligatorio.'); return; }

  const boton = document.getElementById('btn-guardar-material');
  boton.disabled = true;
  boton.textContent = 'Guardando...';

  try {
    let urlArchivo = null;

    if (tipo === 'documento') {
      if (!archivoSeleccionado) throw new Error('Debes seleccionar un archivo.');

      const archivoAsubir = await comprimirImagen(archivoSeleccionado);
      const nombreLimpio = archivoAsubir.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
      const rutaArchivo = `${fichaId}/${Date.now()}_${nombreLimpio}`;

      const { error: errorSubida } = await supabaseClient
        .storage
        .from('material-formacion')
        .upload(rutaArchivo, archivoAsubir);

      if (errorSubida) throw new Error('Error al subir el archivo: ' + errorSubida.message);

      const { data: urlPublica } = supabaseClient
        .storage
        .from('material-formacion')
        .getPublicUrl(rutaArchivo);

      urlArchivo = urlPublica.publicUrl;
    } else {
      const url = document.getElementById('url-material').value.trim();
      if (!url) throw new Error('Debes ingresar una URL.');
      urlArchivo = url;
    }

    const { error: errorInsert } = await supabaseClient.from('material_formacion').insert({
      ficha_id: fichaId,
      competencia_id: competenciaId,
      resultados_ra: resultadosSeleccionados,
      titulo,
      tipo,
      semana: semana ? parseInt(semana) : null,
      url_archivo: urlArchivo,
      descripcion: descripcion || null,
    });

    if (errorInsert) throw new Error(errorInsert.message);

    mostrarExito('Material agregado correctamente.');
    limpiarFormulario();
    await cargarListaMaterial(fichaId);

  } catch (err) {
    mostrarError(err.message);
  } finally {
    boton.disabled = false;
    boton.textContent = '+ Agregar material';
  }
}

function limpiarFormulario() {
  document.getElementById('titulo-material').value = '';
  document.getElementById('descripcion-material').value = '';
  document.getElementById('url-material').value = '';
  archivoSeleccionado = null;
  inputArchivo.value = '';
  document.getElementById('texto-zona-carga').innerHTML = `<strong>Haz clic para subir</strong> o arrastra el archivo aquí`;
}

async function cargarListaMaterial(fichaId) {
  const cont = document.getElementById('lista-material-completa');
  cont.innerHTML = '<p style="color:var(--gris-texto);">Cargando...</p>';

  const { data: materiales, error } = await supabaseClient
    .from('material_formacion')
    .select('id, titulo, tipo, url_archivo, descripcion, semana, created_at, competencias(nombre)')
    .eq('ficha_id', fichaId)
    .order('created_at', { ascending: false });

  if (error) {
    cont.innerHTML = `<p style="color:var(--rojo-error);">Error: ${error.message}</p>`;
    return;
  }
  if (!materiales || materiales.length === 0) {
    cont.innerHTML = '<p style="color:var(--gris-texto);">Aún no hay material cargado para esta ficha.</p>';
    return;
  }

  // Agrupar por semana (1-10), dejando "Sin asignar" al final
  const grupos = {};
  materiales.forEach(m => {
    const clave = m.semana ? `Semana ${m.semana}` : 'Sin asignar';
    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(m);
  });

  const clavesOrdenadas = Object.keys(grupos).sort((a, b) => {
    if (a === 'Sin asignar') return 1;
    if (b === 'Sin asignar') return -1;
    return parseInt(a.replace('Semana ', '')) - parseInt(b.replace('Semana ', ''));
  });

  cont.innerHTML = clavesOrdenadas.map(clave => `
    <div class="grupo-competencia">
      <h4>${clave}</h4>
      <div class="lista-materiales">
        ${grupos[clave].map(m => `
          <div class="tarjeta-material">
            <div class="icono-tipo">${ICONOS_TIPO[m.tipo] || '📄'}</div>
            <div class="contenido">
              <div class="titulo">${m.titulo}</div>
              ${m.descripcion ? `<div class="descripcion">${m.descripcion}</div>` : ''}
              <div class="meta">
                ${m.tipo === 'documento'
                    ? `<a href="#" onclick="abrirVisor('${m.url_archivo}', '${m.titulo.replace(/'/g,"\\'")}'); return false;" style="color:var(--azul-sena); font-weight:600;">👁 Ver</a> · <a href="${m.url_archivo}" download target="_blank" style="color:var(--verde-oscuro); font-weight:600;">⬇ Descargar</a>`
                    : `<a href="${m.url_archivo}" target="_blank" style="color:var(--azul-sena); font-weight:600;">Abrir →</a>`
                  }
                ${m.competencias?.nombre ? ` · <span class="etiqueta etiqueta-gris">${m.competencias.nombre}</span>` : ''}
                · ${new Date(m.created_at).toLocaleDateString('es-CO')}
              </div>
            </div>
            <button class="btn btn-secundario" style="font-size:0.75rem; padding:5px 10px;" onclick="eliminarMaterial('${m.id}')">Eliminar</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function eliminarMaterial(id) {
  if (!confirm('¿Eliminar este material? Esta acción no se puede deshacer.')) return;
  const { error } = await supabaseClient.from('material_formacion').delete().eq('id', id);
  if (error) {
    mostrarError('No se pudo eliminar: ' + error.message);
    return;
  }
  const fichaId = document.getElementById('select-ficha').value;
  cargarListaMaterial(fichaId);
}

function mostrarError(texto) {
  const el = document.getElementById('mensaje-error');
  el.textContent = texto;
  el.classList.add('visible');
}
function mostrarExito(texto) {
  const el = document.getElementById('mensaje-exito');
  el.textContent = texto;
  el.classList.add('visible');
}
function ocultarMensajes() {
  document.getElementById('mensaje-error').classList.remove('visible');
  document.getElementById('mensaje-exito').classList.remove('visible');
}

function abrirVisor(url, titulo) {
  const extension = url.split('?')[0].split('.').pop().toLowerCase();
  const cuerpo = document.getElementById('modal-visor-cuerpo');

  if (['jpg','jpeg','png','gif','webp'].includes(extension)) {
    cuerpo.innerHTML = `<img src="${url}" alt="${titulo}">`;
  } else if (extension === 'pdf') {
    cuerpo.innerHTML = `<iframe src="${url}"></iframe>`;
  } else if (['doc','docx','ppt','pptx','xls','xlsx'].includes(extension)) {
    cuerpo.innerHTML = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"></iframe>`;
  } else {
    cuerpo.innerHTML = `<div style="padding:40px; text-align:center;"><p class="texto-ayuda">Este tipo de archivo no se puede previsualizar aquí.</p><a href="${url}" target="_blank" class="btn btn-primario" style="margin-top:10px; display:inline-block;">Abrir en una pestaña nueva</a></div>`;
  }

  document.getElementById('modal-visor-titulo').textContent = titulo;
  document.getElementById('modal-visor').classList.add('visible');
}

function cerrarVisor() {
  document.getElementById('modal-visor').classList.remove('visible');
  document.getElementById('modal-visor-cuerpo').innerHTML = '';
}

cargarFichas();
</script>
</body>
</html>

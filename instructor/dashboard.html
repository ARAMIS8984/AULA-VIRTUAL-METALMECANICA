<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Instructor - AulaSENA</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="topbar">
  <div class="marca">Aula<span>SENA</span></div>
  <nav>
    <a href="dashboard.html" class="activo">Fichas</a>
    <a href="asistencia.html">Asistencia</a>
    <a href="material.html">Material</a>
    <a href="examenes.html">Exámenes</a>
    <a href="foro.html">Foro</a>
    <a href="reportes.html">Reportes</a>
  </nav>
  <button class="btn-salir" onclick="cerrarSesionInstructor()">Salir</button>
</div>

<div class="contenedor" style="padding-top:32px; padding-bottom:48px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2>Mis fichas</h2>
    <a href="crear-ficha.html" class="btn btn-primario">+ Crear ficha</a>
  </div>

  <div class="tarjeta" id="contenedor-fichas">
    <p style="color:var(--gris-texto);">Cargando fichas...</p>
  </div>
</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth.js"></script>
<script>
requerirSesionInstructor();

async function cargarFichas() {
  const cont = document.getElementById('contenedor-fichas');
  const { data: fichas, error } = await supabaseClient
    .from('fichas')
    .select('id, numero_ficha, programa, trimestre, nombre_grupo, total_aprendices, created_at')
    .order('created_at', { ascending: false });

  if (error) {
    cont.innerHTML = `<p style="color:var(--rojo-error);">Error cargando fichas: ${error.message}</p>`;
    return;
  }

  if (!fichas || fichas.length === 0) {
    cont.innerHTML = `<p style="color:var(--gris-texto);">Aún no has creado ninguna ficha. Haz clic en "+ Crear ficha" para empezar.</p>`;
    return;
  }

  const filas = fichas.map(f => `
    <tr onclick="window.location.href='ficha-detalle.html?id=${f.id}'" style="cursor:pointer;">
      <td><strong>${f.nombre_grupo || '—'}</strong></td>
      <td>${f.numero_ficha}</td>
      <td>${f.programa}</td>
      <td>${f.trimestre}</td>
      <td>${f.total_aprendices}</td>
      <td>${new Date(f.created_at).toLocaleDateString('es-CO')}</td>
    </tr>
  `).join('');

  cont.innerHTML = `
    <div class="tabla-scroll">
      <table>
        <thead>
          <tr><th>Grupo</th><th>Ficha</th><th>Programa</th><th>Trimestre</th><th>Aprendices</th><th>Creada</th></tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  `;
}

cargarFichas();
</script>
</body>
</html>
